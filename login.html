<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - VELLEGA</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
 <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap');
    body { font-family: 'Playfair Display', serif; }
  </style>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-gray-900 p-8 rounded-lg shadow-lg">
    <h2 class="text-3xl font-bold mb-6 text-center">Login to VELLEGA</h2>

    <form id="login-form">
      <div class="mb-4">
        <label for="email" class="block text-sm font-semibold mb-2">Email Address</label>
        <input type="email" id="email" class="w-full px-4 py-2 bg-black border border-gray-700 rounded text-white focus:outline-none focus:ring-2 focus:ring-white" required>
      </div>

      <div class="mb-6">
        <label for="password" class="block text-sm font-semibold mb-2">Password</label>
        <input type="password" id="password" class="w-full px-4 py-2 bg-black border border-gray-700 rounded text-white focus:outline-none focus:ring-2 focus:ring-white" required>
      </div>

      <button type="submit" class="w-full bg-white text-black font-semibold py-2 px-4 rounded hover:bg-gray-200 transition">Login</button>
    </form>

    <p class="mt-6 text-sm text-center text-gray-400">
      Don't have an account?
      <a href="signup.html" class="underline hover:text-white">Sign Up</a>
    </p>
  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      localStorage.setItem("user", email);
      window.location.href = "index.html";
    });
  </script>
</body>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCcmnhjA05Xj3oHo8m3AS6EiOPXu-ewn0g",
    authDomain: "vellega-auth.firebaseapp.com",
    projectId: "vellega-auth",
    storageBucket: "vellega-auth.firebasestorage.app",
    messagingSenderId: "422298524460",
    appId: "1:422298524460:web:c4bb023f1301bfe16bea89",
    measurementId: "G-LHMJRCS07C"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Signup Handler
  document.getElementById("signup-form").addEventListener("submit", function(e) {
    e.preventDefault();
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then((userCredential) => {
        const user = userCredential.user;

        // Optional: Save name and phone locally
        localStorage.setItem("user", JSON.stringify({ name, phone, email }));

        // Redirect to homepage
        window.location.href = "index.html";
      })
      .catch((error) => {
        alert(error.message);
        console.error(error);
      });
  });
</script>
</html>
