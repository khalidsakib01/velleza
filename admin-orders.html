<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Admin | VELLEZA</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --gold: #b8975a;
      --bg: #090909;
      --panel: #141414;
      --line: #2b2b2b;
      --text: #f5f0e8;
      --muted: rgba(245,240,232,0.58);
      --danger: #d96d6d;
      --success: #6bb390;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at top, #171717, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      margin-bottom: 26px;
    }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-size: 1.8rem;
      text-decoration: none;
      color: var(--text);
    }
    .meta {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1.5fr 0.9fr 0.9fr 0.8fr;
      gap: 12px;
      margin-bottom: 22px;
    }
    .panel, .order-card {
      background: rgba(20,20,20,0.94);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(8px);
    }
    input, select, button {
      width: 100%;
      background: #101010;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
    }
    button {
      background: var(--gold);
      color: #0a0a0a;
      font-weight: 600;
      cursor: pointer;
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    .order-card {
      display: grid;
      gap: 14px;
    }
    .topline, .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .tag.ok { color: var(--success); border-color: rgba(107,179,144,0.35); }
    .tag.warn { color: var(--gold); border-color: rgba(184,151,90,0.35); }
    .tag.bad { color: var(--danger); border-color: rgba(217,109,109,0.35); }
    .title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
    }
    .items, .address {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
      white-space: pre-line;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
    }
    .status {
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .error { border-color: rgba(217,109,109,0.45); color: #ffb8b8; }
    .empty { color: var(--muted); text-align: center; padding: 48px 16px; }
    @media (max-width: 900px) {
      .toolbar, .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <a href="index.html" class="brand">Velleza Admin</a>
        <div class="meta">Private order management dashboard</div>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a href="index.html" class="ghost" style="text-decoration:none; display:inline-flex; align-items:center; padding:12px 14px; border-radius:12px;">Back to site</a>
        <button id="logout-btn" class="ghost" style="width:auto;">Sign out</button>
      </div>
    </div>

    <div id="status-box" class="panel status">Checking access...</div>

    <div id="dashboard" style="display:none;">
      <div class="toolbar">
        <input id="search-input" type="text" placeholder="Search by transaction, name, email, phone" />
        <select id="payment-filter">
          <option value="">All payment states</option>
          <option value="paid">Paid</option>
          <option value="pending">Pending</option>
          <option value="pending_on_delivery">Pending on delivery</option>
          <option value="failed">Failed</option>
          <option value="unverified">Unverified</option>
        </select>
        <select id="order-filter">
          <option value="">All order states</option>
          <option value="confirmed">Confirmed</option>
          <option value="payment_pending">Payment pending</option>
          <option value="payment_review">Payment review</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button id="refresh-btn">Refresh Orders</button>
      </div>

      <div id="orders-grid" class="grid"></div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCcmnhjA05Xj3oHo8m3AS6EiOPXu-ewn0g",
      authDomain: "vellega-auth.firebaseapp.com",
      projectId: "vellega-auth",
      storageBucket: "vellega-auth.firebasestorage.app",
      messagingSenderId: "422298524460",
      appId: "1:422298524460:web:c4bb023f1301bfe16bea89",
      measurementId: "G-LHMJRCS07C"
    };

    const ADMIN_EMAILS = [
      "khalidsakib07@gmail.com"
    ];

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();
    const statusBox = document.getElementById('status-box');
    const dashboard = document.getElementById('dashboard');
    const ordersGrid = document.getElementById('orders-grid');
    const searchInput = document.getElementById('search-input');
    const paymentFilter = document.getElementById('payment-filter');
    const orderFilter = document.getElementById('order-filter');
    const refreshBtn = document.getElementById('refresh-btn');
    const logoutBtn = document.getElementById('logout-btn');
    let allOrders = [];

    function setStatus(message, isError) {
      statusBox.textContent = message;
      statusBox.className = `panel status${isError ? ' error' : ''}`;
    }

    function formatDate(value) {
      if (!value) return 'Just now';
      if (value.toDate) return value.toDate().toLocaleString();
      return new Date(value).toLocaleString();
    }

    function getTagClass(value) {
      if (['paid', 'confirmed'].includes(value)) return 'ok';
      if (['failed', 'cancelled'].includes(value)) return 'bad';
      return 'warn';
    }

    function normalizeOrder(doc) {
      const data = doc.data();
      return { id: doc.id, ...data };
    }

    function matchesFilters(order) {
      const term = searchInput.value.trim().toLowerCase();
      const payment = paymentFilter.value;
      const orderState = orderFilter.value;

      if (payment && order.payment_status !== payment) return false;
      if (orderState && order.order_status !== orderState) return false;

      if (!term) return true;

      const haystack = [
        order.tran_id,
        order.customer && order.customer.name,
        order.customer && order.customer.email,
        order.customer && order.customer.phone
      ].join(' ').toLowerCase();

      return haystack.includes(term);
    }

    async function updateOrder(id, patch) {
      await db.collection('orders').doc(id).set({
        ...patch,
        updated_at: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    }

    function buildItems(items) {
      if (!Array.isArray(items) || !items.length) return 'No items saved';
      return items.map((item) => `${item.name} x${item.quantity} (${item.size || '-'})`).join('\n');
    }

    function renderOrders() {
      const visible = allOrders.filter(matchesFilters);
      if (!visible.length) {
        ordersGrid.innerHTML = '<div class="panel empty">No orders match the current filters.</div>';
        return;
      }

      ordersGrid.innerHTML = visible.map((order) => `
        <div class="order-card">
          <div class="topline">
            <div>
              <div class="title">${order.tran_id || order.id}</div>
              <div class="meta">${formatDate(order.created_at)}</div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              <span class="tag ${getTagClass(order.payment_status)}">${order.payment_status || 'unknown'}</span>
              <span class="tag ${getTagClass(order.order_status)}">${order.order_status || 'unknown'}</span>
            </div>
          </div>

          <div class="row">
            <div><strong>Customer:</strong> ${(order.customer && order.customer.name) || 'N/A'}</div>
            <div><strong>Total:</strong> BDT ${Number(order.total_amount || 0).toLocaleString()}</div>
          </div>

          <div class="row">
            <div><strong>Email:</strong> ${(order.customer && order.customer.email) || 'N/A'}</div>
            <div><strong>Phone:</strong> ${(order.customer && order.customer.phone) || 'N/A'}</div>
          </div>

          <div class="address"><strong>Address:</strong> ${(order.customer && order.customer.address) || 'N/A'}, ${(order.customer && order.customer.city) || ''}</div>
          <div class="items"><strong>Items</strong>\n${buildItems(order.products)}</div>

          <div class="actions">
            <select data-kind="payment" data-id="${order.id}">
              <option value="pending" ${order.payment_status === 'pending' ? 'selected' : ''}>pending</option>
              <option value="paid" ${order.payment_status === 'paid' ? 'selected' : ''}>paid</option>
              <option value="pending_on_delivery" ${order.payment_status === 'pending_on_delivery' ? 'selected' : ''}>pending_on_delivery</option>
              <option value="failed" ${order.payment_status === 'failed' ? 'selected' : ''}>failed</option>
              <option value="unverified" ${order.payment_status === 'unverified' ? 'selected' : ''}>unverified</option>
            </select>
            <select data-kind="order" data-id="${order.id}">
              <option value="payment_pending" ${order.order_status === 'payment_pending' ? 'selected' : ''}>payment_pending</option>
              <option value="confirmed" ${order.order_status === 'confirmed' ? 'selected' : ''}>confirmed</option>
              <option value="processing" ${order.order_status === 'processing' ? 'selected' : ''}>processing</option>
              <option value="shipped" ${order.order_status === 'shipped' ? 'selected' : ''}>shipped</option>
              <option value="cancelled" ${order.order_status === 'cancelled' ? 'selected' : ''}>cancelled</option>
              <option value="payment_review" ${order.order_status === 'payment_review' ? 'selected' : ''}>payment_review</option>
            </select>
            <button class="save-btn" data-id="${order.id}">Save</button>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.save-btn').forEach((button) => {
        button.addEventListener('click', async () => {
          const id = button.dataset.id;
          const paymentValue = document.querySelector(`select[data-kind="payment"][data-id="${id}"]`).value;
          const orderValue = document.querySelector(`select[data-kind="order"][data-id="${id}"]`).value;
          button.disabled = true;
          button.textContent = 'Saving...';
          try {
            await updateOrder(id, {
              payment_status: paymentValue,
              order_status: orderValue
            });
            setStatus(`Order ${id} updated successfully.`);
            await loadOrders();
          } catch (error) {
            setStatus(error.message || 'Could not update the order.', true);
          } finally {
            button.disabled = false;
            button.textContent = 'Save';
          }
        });
      });
    }

    async function loadOrders() {
      setStatus('Loading orders...');
      const snapshot = await db.collection('orders').orderBy('created_at', 'desc').limit(100).get();
      allOrders = snapshot.docs.map(normalizeOrder);
      setStatus(`Loaded ${allOrders.length} orders.`);
      renderOrders();
    }

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        setStatus('Please sign in first to view the admin dashboard.', true);
        return;
      }

      if (!ADMIN_EMAILS.includes(user.email)) {
        setStatus('This account is not allowed to access the admin dashboard. Update ADMIN_EMAILS in admin-orders.html and firestore.rules.', true);
        return;
      }

      dashboard.style.display = 'block';
      try {
        await loadOrders();
      } catch (error) {
        setStatus(error.message || 'Could not load orders.', true);
      }
    });

    searchInput.addEventListener('input', renderOrders);
    paymentFilter.addEventListener('change', renderOrders);
    orderFilter.addEventListener('change', renderOrders);
    refreshBtn.addEventListener('click', loadOrders);
    logoutBtn.addEventListener('click', async () => {
      await auth.signOut();
      localStorage.removeItem('user');
      location.href = 'login.html';
    });

    lucide.createIcons();
  </script>
</body>
</html>
