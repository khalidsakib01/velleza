<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELLEZA | Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">

  <div class="max-w-4xl mx-auto py-10 px-6">
    <h1 class="text-3xl font-bold mb-6">Shopping Cart</h1>
    <div id="cart-items" class="space-y-4"></div>

    <div class="mt-6 flex justify-between items-center">
      <span class="text-xl font-semibold">Total: $<span id="total">0</span></span>
      <a href="checkout.html" class="bg-black text-white px-6 py-3 rounded hover:bg-gray-800">Checkout</a>
    </div>
  </div>

  <script>
    function renderCart() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let container = document.getElementById("cart-items");
      container.innerHTML = "";
      let total = 0;

      cart.forEach((item, index) => {
        total += item.price * item.qty;
        container.innerHTML += `
          <div class="flex justify-between items-center bg-white p-4 rounded shadow">
            <div>
              <p class="font-semibold">${item.name}</p>
              <p class="text-sm text-gray-600">Size: ${item.size}</p>
              <p class="text-sm text-gray-600">Price: $${item.price}</p>
            </div>
            <div class="flex items-center space-x-2">
              <input type="number" value="${item.qty}" min="1" onchange="updateQty(${index}, this.value)" class="w-16 border rounded p-1">
              <button onclick="removeItem(${index})" class="text-red-600 hover:underline">Remove</button>
            </div>
          </div>
        `;
      });

      document.getElementById("total").textContent = total.toFixed(2);
    }

    function updateQty(index, qty) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart[index].qty = parseInt(qty);
      localStorage.setItem("cart", JSON.stringify(cart));
      renderCart();
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      renderCart();
    }

    renderCart();
  </script>

</body>
</html>
