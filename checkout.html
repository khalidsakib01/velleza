<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELLEZA | Checkout</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">

  <div class="max-w-3xl mx-auto py-10 px-6">
    <h1 class="text-3xl font-bold mb-6">Checkout</h1>
    <form id="checkout-form" class="space-y-6 bg-white p-6 rounded shadow">
      <!-- Name -->
      <div>
        <label class="block mb-1 font-medium">Full Name</label>
        <input type="text" required class="w-full border rounded p-2">
      </div>
      <!-- Address -->
      <div>
        <label class="block mb-1 font-medium">Shipping Address</label>
        <textarea required class="w-full border rounded p-2"></textarea>
      </div>
      <!-- Payment -->
      <div>
        <label class="block mb-1 font-medium">Payment Method</label>
        <select required class="w-full border rounded p-2">
          <option value="cod">Cash on Delivery</option>
          <option value="bkash">bKash</option>
          <option value="card">Credit/Debit Card</option>
        </select>
      </div>

      <button type="submit" class="bg-black text-white px-6 py-3 rounded hover:bg-gray-800">
        Place Order
      </button>
    </form>
  </div>

  <script>
    document.getElementById("checkout-form").addEventListener("submit", (e) => {
      e.preventDefault();
      alert("✅ Order placed successfully!");
      localStorage.removeItem("cart");
      window.location.href = "index.html";
    });
  </script>

</body>
</html>
