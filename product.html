<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VELLEZA | Product</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">

  <div class="max-w-5xl mx-auto py-10 px-6 grid md:grid-cols-2 gap-8">
    
    <!-- Product Image -->
    <div>
      <img src="gucci1.png" alt="Luxury Handbag" class="w-full rounded-lg shadow-lg">
    </div>

    <!-- Product Details -->
    <div>
      <h1 class="text-3xl font-bold mb-4">Luxury Handbag</h1>
      <p class="text-xl text-gray-700 mb-4">$499</p>
      <p class="text-gray-600 mb-6">Crafted from premium leather, this luxury handbag is designed with timeless elegance and durability in mind.</p>

      <!-- Size -->
      <label class="block mb-2 font-medium">Size</label>
      <select id="size" class="w-full border rounded p-2 mb-4">
        <option>Small</option>
        <option>Medium</option>
        <option>Large</option>
      </select>

      <!-- Quantity -->
      <label class="block mb-2 font-medium">Quantity</label>
      <input type="number" id="quantity" value="1" min="1" class="w-20 border rounded p-2 mb-6">

      <!-- Add to Cart -->
      <button onclick="addToCart('Luxury Handbag', 499)" class="bg-black text-white px-6 py-3 rounded hover:bg-gray-800">
        Add to Cart
      </button>
    </div>
  </div>

  <script>
    function addToCart(name, price) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let size = document.getElementById("size").value;
      let qty = parseInt(document.getElementById("quantity").value);

      const item = { name, price, size, qty };
      cart.push(item);
      localStorage.setItem("cart", JSON.stringify(cart));
      alert(`${qty} x ${name} added to cart!`);
      window.location.href = "cart.html";
    }
  </script>
</body>
</html>
